{% extends 'base/base.html' %}
{% block title %}فصل دراسي جديد{% endblock %}
{% block content %}
<div class="container px-4" style="max-width:520px">
  <div class="page-header"><h4 class="page-title"><i class="bi bi-calendar-plus"></i>فصل دراسي جديد</h4></div>
  <div class="card overflow-hidden">
    <div class="card-header card-header-navy py-3 px-4"><h5 class="text-white fw-bold mb-0"><i class="bi bi-calendar3 me-2" style="color:#C9A84C"></i>إنشاء فصل دراسي</h5></div>
    <div class="card-body p-4">
      <form method="POST">{% csrf_token %}
        <div class="mb-4">
          <label class="form-label fw-semibold text-navy">العام الدراسي</label>
          <select name="academic_year" class="form-select form-select-lg" required>
            <option value="">-- اختر العام --</option>
            <option value="24/25">2024 / 2025</option>
            <option value="25/26" selected>2025 / 2026</option>
            <option value="26/27">2026 / 2027</option>
            <option value="27/28">2027 / 2028</option>
          </select>
        </div>
        <div class="mb-5">
          <label class="form-label fw-semibold text-navy">الفصل الدراسي</label>
          <div class="row g-3">
            <div class="col-4">
              <input type="radio" class="btn-check" name="semester_type" id="s1" value="first" required>
              <label class="btn btn-outline-primary w-100 py-3 d-flex flex-column align-items-center gap-1 rounded-3" for="s1" style="border-color:#1B2A5E;color:#1B2A5E">
                <i class="bi bi-1-circle fs-4"></i><span class="small fw-bold">الأول</span>
              </label>
            </div>
            <div class="col-4">
              <input type="radio" class="btn-check" name="semester_type" id="s2" value="second">
              <label class="btn btn-outline-primary w-100 py-3 d-flex flex-column align-items-center gap-1 rounded-3" for="s2" style="border-color:#1B2A5E;color:#1B2A5E">
                <i class="bi bi-2-circle fs-4"></i><span class="small fw-bold">الثاني</span>
              </label>
            </div>
            <div class="col-4">
              <input type="radio" class="btn-check" name="semester_type" id="s3" value="summer">
              <label class="btn btn-outline-warning w-100 py-3 d-flex flex-column align-items-center gap-1 rounded-3" for="s3" style="border-color:#C9A84C;color:#C9A84C">
                <i class="bi bi-sun fs-4"></i><span class="small fw-bold">الصيفي</span>
              </label>
            </div>
          </div>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-navy btn-lg rounded-3 fw-bold py-3"><i class="bi bi-check2-circle me-2"></i>إنشاء الفصل</button>
          <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary rounded-3">إلغاء</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
